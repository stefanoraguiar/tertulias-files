<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Artigo | Tertúlias Não-Monogâmicas do Porto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="article-page-container">
        <a href="javascript:history.back()" class="btn-back">← Voltar</a>         
        <article class="article-content" id="article-data">
            <p>A carregar artigo...</p>
        </article>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        const PROJECT_ID = "zhr2ddpl";

        const QUERY = encodeURIComponent(`*[_type == "article" && slug.current == "${slug}"][0]`);
        const URL = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/production?query=${QUERY}`;

        // PORTABLE TEXT TRANSLATOR: Turns Sanity blocks into HTML
        function blocksToHtml(blocks) {
            return blocks.map(block => {
                if (block._type !== 'block' || !block.children) return '';
                const text = block.children.map(child => child.text).join('');
                return `<p>${text}</p>`; // Basic version: wraps every block in a paragraph
            }).join('');
        }

        fetch(URL)
            .then(res => res.json())
            .then(({ result }) => {
                const container = document.getElementById('event-details');
                if (result) {
                    document.title = `${result.title} | Eventos Amory Porto`;

                    const date = new Date(result.date).toLocaleString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
                    container.innerHTML = `
                        <div class="meta-info">★ ${date}</div>
                        <h1>${result.title}</h1>
                        <p style="font-size: 1.3rem;">📍 <strong>Local:</strong> ${result.locationName || 'Porto'}</p>
                        <p><strong>Morada:</strong> ${result.address || 'Ver detalhes no mapa'}</p>
                        <div class="description">${result.description}</div>
                    `;
                } else {
                    container.innerHTML = "<h1>Evento não encontrado.</h1>";
                    document.title = "Evento não encontrado | Amory Porto";
                }
            })
            .catch(err => {
                console.error("Erro a carregar evento:", err);
                document.getElementById('event-details').innerHTML = "<p>Ocorreu um erro ao carregar os dados.</p>";
            });
    </script>
</body>
</html>
